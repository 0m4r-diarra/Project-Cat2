<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register - SmartSaver</title>

    <link rel="stylesheet" href="style.css">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">SmartSaver</a>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="goals.html">Goals</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active" href="register.html">Register</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="contact.html">Contact</a>
                </li>

            </ul>

        </div>
    </div>
</nav>

<!-- Registration Section -->
<div class="container my-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-body p-5">

                    <h2 class="text-center text-success mb-4">Registration Form</h2>
                    
                    <p class="lead text-center mb-4">
                        Join SmartSaver today and start achieving your financial goals!
                    </p>

                    <form>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Full Name:</label>
                            <input type="text" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Email:</label>
                            <input type="email" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Password:</label>
                            <input type="password" class="form-control" required>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Age:</label>
                                <input type="number" class="form-control">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Date of Birth:</label>
                                <input type="date" class="form-control">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Gender:</label><br>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="gender" id="genderMale">
                                <label class="form-check-label" for="genderMale">Male</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="gender" id="genderFemale">
                                <label class="form-check-label" for="genderFemale">Female</label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Primary Saving Goal:</label>
                            <select class="form-select">
                                <option selected disabled>Choose a goal...</option>
                                <option value="laptop">Laptop</option>
                                <option value="business">Business</option>
                                <option value="car">Car</option>
                                <option value="education">School Fees</option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Upload Photo:</label>
                            <input type="file" class="form-control">
                        </div>

                        <div class="d-grid">
                            <input type="submit" value="Register Account" class="btn btn-success btn-lg">
                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3 mt-5">
    <p class="mb-0">
        © 2026 SmartSaver | Helping you to Achieve your  Financial Success
    </p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
