<!-- Registration Section -->
<div class="container my-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-body p-5">

                    <h2 class="text-center text-success mb-4">Registration Form</h2>
                    
                    <p class="lead text-center mb-4">
                        Join SmartSaver today and start achieving your financial goals!
                    </p>

                  <form id="registrationForm">

    <!-- Names Section split into First and Last Name -->
    <div class="row mb-3">
        <div class="col-md-6">
            <label class="form-label fw-bold">First Name:</label>
            <input type="text" id="fname" class="form-control" required placeholder="e.g. John">
        </div>
        <div class="col-md-6">
            <label class="form-label fw-bold">Last Name:</label>
            <input type="text" id="lastname" class="form-control" required placeholder="e.g. Doe">
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">Email:</label>
        <input type="email" id="email" class="form-control" required placeholder="e.g. name@example.com">
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">Password:</label>
        <input type="password" id="password" class="form-control" required>
    </div>

    <div class="row mb-3">
        <div class="col-md-6">
            <label class="form-label fw-bold">Age:</label>
            <input type="number" id="age" class="form-control">
        </div>
        <div class="col-md-6">
            <label class="form-label fw-bold">Date of Birth:</label>
            <input type="date" id="dob" class="form-control">
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">Gender:</label><br>
        <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="gender" id="genderMale" value="Male">
            <label class="form-check-label" for="genderMale">Male</label>
        </div>
        <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="gender" id="genderFemale" value="Female">
            <label class="form-check-label" for="genderFemale">Female</label>
        </div>
    </div>

    <!-- Primary Saving Goal changed to a single-word text input -->
    <div class="mb-4">
        <label class="form-label fw-bold">Primary Saving Goal:</label>
        <input type="text" id="savingGoal" class="form-control" required placeholder="e.g. Laptop, Business, Car, Fees">
        <div class="form-text text-muted">Please enter your goal as a single word.</div>
    </div>

    <!-- Photo Upload Section has been removed -->

    <div class="d-grid">
        <input type="submit" value="Register Account" class="btn btn-success btn-lg">
    </div>

</form>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3 mt-5">
    <p class="mb-0">
         2026 SmartSaver | here for you
    </p>
</footer>
