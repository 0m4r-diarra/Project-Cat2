<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SmartSaver</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-success py-3">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">SmartSaver</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto gap-2">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link active" href="goals.html">Savings Goals</a></li>
                <li class="nav-item"><a class="nav-link" href="tips.html">Financial Tips</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            </ul>
            <a href="register.html" class="btn btn-light text-success fw-bold ms-lg-3">Register Now</a>
        </div>
        
    </div>
</nav>

<main class="container my-5" style="max-width: 700px;">
    <div class="card shadow-sm border-0 p-4 bg-white">
        <h2 class="text-center text-success fw-bold mb-4">Create Your Account</h2>
        <form id="registrationForm">
            <div class="row g-3 mb-3">
                <div class="col-sm-6">
                    <label for="fname" class="form-label fw-bold">First Name</label>
                    <input type="text" class="form-control" id="fname" placeholder="Jane">
                </div>
                <div class="col-sm-6">
                    <label for="lastname" class="form-label fw-bold">Last Name</label>
                    <input type="text" class="form-control" id="lastname" placeholder="Doe">
                </div>
            </div>
            
            <div class="mb-3">
                <label for="email" class="form-label fw-bold">Email Address</label>
                <input type="email" class="form-control" id="email" placeholder="jane@example.com">
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label fw-bold">Password</label>
                <input type="password" class="form-control" id="password" placeholder="At least 6 characters">
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold d-block mb-2">Gender</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" id="genderMale" value="Male" checked>
                    <label class="form-check-label" for="genderMale">Male</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" id="genderFemale" value="Female">
                    <label class="form-check-label" for="genderFemale">Female</label>
                </div>
            </div>

            <label class="form-label fw-bold d-block mb-3">Select Your Primary Saving Goal</label>
            <div class="row g-3 mb-4" id="goalContainer">
                <div class="col-6 col-md-3">
                    <div class="card h-100 text-center py-3 goal-card" data-goal="Business" style="cursor: pointer;">
                        <div class="fs-2">💼</div>
                        <small class="fw-bold mt-1">Business</small>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card h-100 text-center py-3 goal-card" data-goal="Emergency" style="cursor: pointer;">
                        <div class="fs-2">🛡️</div>
                        <small class="fw-bold mt-1">Emergency</small>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card h-100 text-center py-3 goal-card" data-goal="School Fees" style="cursor: pointer;">
                        <div class="fs-2">📚</div>
                        <small class="fw-bold mt-1">School Fees</small>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card h-100 text-center py-3 goal-card" data-goal="Laptop" style="cursor: pointer;">
                        <div class="fs-2">💻</div>
                        <small class="fw-bold mt-1">Laptop</small>
                    </div>
                </div>
            </div>
            
            <input type="hidden" id="savingGoal" value="">

            <button type="submit" class="btn btn-success w-100 py-2 fw-bold fs-5">Register Account</button>
        </form>
    </div>
</main>

<footer class="bg-dark text-white text-center p-4 mt-auto">
    <p class="mb-0">&copy; 2026 SmartSaver | Here for you</p>
</footer>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
