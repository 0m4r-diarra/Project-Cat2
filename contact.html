<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - SmartSaver</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-success py-3">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">SmartSaver</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
           <ul class="navbar-nav ms-auto gap-2">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="goals.html">Savings Goals</a></li>
                <li class="nav-item"><a class="nav-link" href="tips.html">Financial Tips</a></li>
                <li class="nav-item"><a class="nav-link active" href="faq.html">FAQ</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            </ul>
            <a href="register.html" class="btn btn-light text-success fw-bold ms-lg-3">Register Now</a>
        </div>
    </div>
</nav>

<main class="container my-5" style="max-width: 600px;">
    <div class="card shadow-sm border-0 p-4 bg-white">
        <h2 class="text-center text-success fw-bold mb-4">Get In Touch</h2>
        <form id="contactForm">
            <div class="mb-3">
                <label for="contactName" class="form-label fw-bold">Full Name</label>
                <input type="text" class="form-control" id="contactName" placeholder="e.g. fname lname">
            </div>
            <div class="mb-3">
                <label for="contactEmail" class="form-label fw-bold">Email Address</label>
                <input type="email" class="form-control" id="contactEmail" placeholder="name@example.com">
            </div>
            <div class="mb-4">
                <label for="contactMessage" class="form-label fw-bold">Message</label>
                <textarea class="form-control" id="contactMessage" rows="4" placeholder="How can we help you today?"></textarea>
            </div>
            <button type="submit" class="btn btn-success w-100 py-2 fw-bold">Send Message</button>
        </form>
    </div>
</main>

<footer class="bg-dark text-white text-center p-4 mt-auto">
    <p class="mb-0">&copy; 2026 SmartSaver | Here for you</p>
</footer>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
